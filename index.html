<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Links</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
--bg1:#410062;
--bg2:#1c01b3;
--bg3:#69003b;
--text:rgb(255, 255, 255);
--card:rgba(217, 161, 255, 0.208);
--card-hover:rgba(0, 255, 251, 0.42);
}

.bg-video {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  object-fit: cover;
  z-index: -1;
  opacity: 1;
  pointer-events: none;
}

body{
font-family:'Inter',sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:none;
background-size:600% 600%;
animation:gradientShift 12s ease infinite;
color:var(--text);
transition:background .4s ease;
}

@keyframes gradientShift{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
width:92%;
max-width:420px;
text-align:center;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:translateY(0)}
}

.top-controls{
position:fixed;
top:15px;
right:15px;
display:flex;
gap:10px;
}

.control-btn{
background:rgba(255,255,255,0.2);
border:none;
backdrop-filter:blur(10px);
padding:8px 10px;
border-radius:10px;
cursor:pointer;
color:white;
font-size:14px;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid rgba(255,255,255,0.7);
margin-bottom:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

h1{
font-size:26px;
margin-bottom:6px;
font-weight:700;
}

.bio{
font-size:14px;
opacity:0.85;
margin-bottom:26px;
}

.links{
display:flex;
flex-direction:column;
gap:12px;
}

.link{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
text-decoration:none;
color:white;
font-weight:600;
padding:15px;
border-radius:14px;
background:var(--card);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
transition:all .25s ease;
position:relative;
overflow:hidden;
}

.link::before{
content:"";
position:absolute;
left:-100%;
top:0;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.4),transparent);
transition:.6s;
}

.link:hover::before{
left:100%;
}

.link:hover{
transform:translateY(-4px) scale(1.02);
background:var(--card-hover);
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.socials{
margin-top:22px;
display:flex;
justify-content:center;
gap:18px;
font-size:22px;
}

.socials a{
color:white;
opacity:.85;
transition:.25s;
}

.socials a:hover{
opacity:1;
transform:scale(1.2);
}

.theme-color{
width:22px;
height:22px;
border-radius:50%;
cursor:pointer;
border:2px solid white;
}

.footer{
margin-top:28px;
font-size:12px;
opacity:.6;
}

</style>
</head>

<body>

<audio id="hoverSound" src="hover.mp3" preload="auto"></audio>
<audio id="clickSound" src="click.mp3" preload="auto"></audio>

<video class="bg-video" autoplay loop muted playsinline>
  <source src="background.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

<div class="container">

<h1>EhxrilTunes</h1>

<div class="bio">Music Artist • Web Developer • Internet Person</div>

<div class="links">

<a class="link" onclick="track('instagram');playClickSound()" href="https://www.instagram.com/ehxriltunes/" target="_blank" onmouseenter="playHoverSound()">
  <i class="fab fa-instagram"></i> EhxrilTunes on Instagram
</a>

<a class="link" onclick="track('youtube');playClickSound()" href="https://youtube.com/@EhxrilTunes" target="_blank" onmouseenter="playHoverSound()">
  <i class="fab fa-youtube"></i> EhxrilTunes on YouTube
</a>

<a class="link" onclick="track('tiktok');playClickSound()" href="https://www.tiktok.com/@ehxril.tunes" target="_blank" onmouseenter="playHoverSound()">
  <i class="fab fa-tiktok"></i> EhxrilTunes on TikTok
</a>

<!-- Spotify link holder -->
<a class="link" onclick="track('spotify');playClickSound()" href="https://open.spotify.com/artist/2SAXfYfNiKN7KRyH19dZ9j" target="_blank" onmouseenter="playHoverSound()">
  <i class="fab fa-spotify"></i> EhxrilTunes on Spotify
</a>

<!-- Twitch link holder -->
<a class="link" onclick="track('twitch');playClickSound()" href="https://www.twitch.tv/ehxriltunes" target="_blank" onmouseenter="playHoverSound()">
  <i class="fab fa-twitch"></i> EhxrilTunes on Twitch
</a>

<!-- Twitter link holder -->
<a class="link" onclick="track('twitter');playClickSound()" href="https://x.com/EhxrilOfficial" target="_blank" onmouseenter="playHoverSound()">
  <i class="fab fa-twitter"></i> EhxrilTunes on Twitter
</a>

<!-- Discord server link holder -->
<a class="link" onclick="track('discord');playClickSound()" href="https://discord.gg/nmCz5k9w" target="_blank" onmouseenter="playHoverSound()">
  <i class="fab fa-discord"></i> Ehxril's Space Station

</a>

<div class="footer">© 2017 EhxrilTunes</div>

</div>

<script>

function setTheme(c1,c2,c3){
document.documentElement.style.setProperty('--bg1',c1)
document.documentElement.style.setProperty('--bg2',c2)
document.documentElement.style.setProperty('--bg3',c3)
}

function track(name){
let clicks=JSON.parse(localStorage.getItem('linkClicks')||'{}')
clicks[name]=(clicks[name]||0)+1
localStorage.setItem('linkClicks',JSON.stringify(clicks))
console.log('Link stats:',clicks)
}

function playHoverSound() {
  const audio = document.getElementById('hoverSound');
  if (audio) {
    audio.currentTime = 0;
    audio.play();
  }
}

function playClickSound() {
  const audio = document.getElementById('clickSound');
  if (audio) {
    audio.currentTime = 0;
    audio.play();
  }
}

</script>
